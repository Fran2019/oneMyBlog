{% extends "blog/base.html" %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block content %}

<div class="article-container">

    <h1>{{ article.title }}</h1>

    <p class="article-meta">
        Published: {{ article.created_at }}
    </p>

    <div class="article-content">
        <p>{{ article.content }}</p>
    </div>
    <a href="{% url 'article_list' %}" class="back-link">
        ← Back to Blog
    </a>

</div>

{% endblock %}
